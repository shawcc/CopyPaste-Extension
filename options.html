<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CopyPaste 设置</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", Arial, sans-serif;
        padding: 16px;
        color: #111827;
      }
      .row {
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
        color: #374151;
      }
      input {
        width: 520px;
        max-width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        font-size: 13px;
      }
      button {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #2563eb;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-size: 13px;
      }
      .hint {
        font-size: 12px;
        color: #6b7280;
        margin-top: 6px;
        line-height: 1.4;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
  <div class="wrap">
    <h2>CopyPaste 插件设置</h2>

    <div class="field">
      <label>导出多语言列（以逗号分隔）</label>
      <input type="text" id="langCols" placeholder="例如: en-US, ja-JP" />
      <div class="desc">默认留空时，只导出 "CN (PM)" 列和 "OCR参考" 列。</div>
    </div>

    <div class="field" style="margin-top: 24px; border-top: 1px solid #e5e7eb; padding-top: 16px;">
      <label>高级 OCR 接口配置 (选填)</label>
      <div class="desc" style="margin-bottom: 8px;">
        插件已内置火山引擎豆包多模态大模型 (Doubao-vision-pro)，<strong>您可以直接使用，无需任何配置</strong>。<br/>
        如果您希望使用自己私有的 API Key (如 GPT-4o, Claude-3.5-Sonnet, 或其他的 Doubao-vision 节点)，请在下方填写。<br/>
        <strong>留空则默认使用内置的大模型服务。</strong>
      </div>
      
      <label style="font-size: 12px; margin-top: 8px;">API Endpoint (URL)</label>
      <input type="text" id="apiUrl" placeholder="例如: https://ark.cn-beijing.volces.com/api/v3/chat/completions" />
      
      <label style="font-size: 12px; margin-top: 8px;">模型名称 (Model)</label>
      <input type="text" id="apiModel" placeholder="例如: ep-20240101-xxxxx" />

      <label style="font-size: 12px; margin-top: 8px;">API Key (Token)</label>
      <input type="password" id="apiKey" placeholder="Bearer Token" />
    </div>

    <button id="saveBtn" class="btn primary" style="margin-top: 24px;">保存设置</button>
    <div id="status" class="status"></div>
  </div>
    <script src="options.js"></script>
  </body>
</html>
